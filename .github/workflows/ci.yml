name: ci

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare ONNX runtime assets
        run: |
          ./scripts/build-sherpa-onnx-runtime.sh
          SHERPA_ONNX_MODEL_PROFILE=trilingual ./scripts/download-sherpa-onnx-model.sh
          SHERPA_ONNX_MODEL_PROFILE=bilingual ./scripts/download-sherpa-onnx-model.sh
          mkdir -p .sisyphus/evidence

      - name: Verify scaffold prerequisites
        run: ./scripts/setup-dev.sh --verify-only

      - name: Run Go and Apple placeholder tests
        run: ./scripts/test-all.sh
