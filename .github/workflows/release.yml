name: release

on:
  push:
    tags:
      - "v*"
      - "alpha.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos-app:
    name: Build macOS app (${{ matrix.arch }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Prepare sherpa-onnx runtime
        run: ./scripts/build-sherpa-onnx-runtime.sh

      - name: Download trilingual sherpa-onnx model
        run: SHERPA_ONNX_MODEL_PROFILE=trilingual ./scripts/download-sherpa-onnx-model.sh

      - name: Download bilingual sherpa-onnx model
        run: SHERPA_ONNX_MODEL_PROFILE=bilingual ./scripts/download-sherpa-onnx-model.sh

      - name: Package macOS app
        run: ./scripts/package-macos-app.sh --arch "${{ matrix.arch }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: TalkaMac-macOS-${{ matrix.arch }}
          path: dist/TalkaMac-macOS-${{ matrix.arch }}.zip
          if-no-files-found: error

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [macos-app]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Talka ${{ github.ref_name }}
          files: release-artifacts/*
